name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: sing-box-config-api

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rust:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release --bin ${APP_NAME}

      - name: Prepare package directory
        run: |
          mkdir -p dist/${APP_NAME}

          cp target/release/${APP_NAME} dist/${APP_NAME}/
          cp install.sh dist/${APP_NAME}/
          cp config.toml dist/${APP_NAME}/
          cp -r scripts dist/${APP_NAME}/

          chmod +x dist/${APP_NAME}/${APP_NAME}
          chmod +x dist/${APP_NAME}/install.sh

      - name: Create release archive
        run: |
          cd dist
          tar -czf ${APP_NAME}-${GITHUB_REF_NAME}-linux-x86_64.tar.gz ${APP_NAME}

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: dist/${{ env.APP_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${APP_NAME}-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes
